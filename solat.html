<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waktu Solat Pintar - SiswaKlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#0057FF',
                        brandYellow: '#FFD700',
                        darkBg: '#0F172A',
                        darkCard: '#1E293B'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .prayer-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .prayer-card:hover { transform: translateY(-5px); }
        .blue-pop-shadow { box-shadow: 0 10px 25px -5px rgba(0, 87, 255, 0.2); }
        
        /* Custom Scrollbar for dark mode */
        .dark ::-webkit-scrollbar { width: 8px; }
        .dark ::-webkit-scrollbar-track { background: #0F172A; }
        .dark ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 10px; }
    </style>
</head>
<body class="bg-transparent p-2 md:p-4 dark:text-slate-100">

    <div class="max-w-4xl mx-auto bg-white dark:bg-darkCard p-6 md:p-8 rounded-[2.5rem] shadow-xl border border-slate-100 dark:border-slate-700">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
            <div class="flex items-center gap-4">
                <div class="p-4 bg-brandBlue text-brandYellow rounded-2xl shadow-lg blue-pop-shadow">
                    <i class="fas fa-kaaba text-2xl"></i>
                </div>
                <div>
                    <h3 class="font-black text-slate-800 dark:text-white text-xl uppercase tracking-tight">Waktu Solat Pintar</h3>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="statusZon" class="text-[10px] text-brandBlue dark:text-brandYellow font-bold px-3 py-1 bg-brandBlue/5 dark:bg-brandYellow/10 rounded-full border border-brandBlue/10 dark:border-brandYellow/20 uppercase tracking-widest">
                            Memuatkan...
                        </span>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-col md:items-end bg-slate-50 dark:bg-slate-800/50 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 w-full md:w-auto">
                <p id="tarikhMasihi" class="text-sm font-black text-slate-700 dark:text-white">-- --- ----</p>
                <p id="tarikhHijri" class="text-[11px] font-bold text-brandBlue dark:text-brandYellow uppercase tracking-wider mt-1">-- ------- ----</p>
            </div>
        </div>

        <div id="prayerContainer" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
            <div class="col-span-full py-12 text-center text-slate-400 dark:text-slate-500">
                <i class="fas fa-circle-notch fa-spin text-3xl mb-3 text-brandBlue"></i>
                <p class="text-xs font-bold uppercase tracking-widest">Menghubungi API Waktu Solat...</p>
            </div>
        </div>

        <div class="bg-slate-50 dark:bg-slate-900/40 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 bg-brandBlue rounded-xl flex items-center justify-center shadow-sm text-brandYellow">
                    <i class="fas fa-map-marker-alt text-xs"></i>
                </div>
                <p class="text-xs font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest">Tetapan Lokasi & Zon</p>
            </div>
            <select id="zonSelect" onchange="kemaskiniWaktu()" class="w-full bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl px-5 py-4 text-sm font-bold text-slate-700 dark:text-slate-200 focus:border-brandBlue dark:focus:border-brandYellow focus:ring-0 transition-all outline-none appearance-none cursor-pointer">
                <optgroup label="Selangor" class="dark:bg-darkCard">
                    <option value="SGR01" selected>Gombak, Petaling, Sepang, Hulu Langat, Hulu Selangor, Shah Alam</option>
                    <option value="SGR02">Klang, Kuala Langat</option>
                    <option value="SGR03">Kuala Selangor, Sabak Bernam</option>
                </optgroup>
                <optgroup label="Wilayah Persekutuan" class="dark:bg-darkCard">
                    <option value="WLY01">Kuala Lumpur, Putrajaya</option>
                    <option value="WLY02">Labuan</option>
                </optgroup>
                <optgroup label="Johor" class="dark:bg-darkCard">
                    <option value="JHR01">Pulau Aur dan Pulau Pemanggil</option>
                    <option value="JHR02">Kota Tinggi, Mersing, Johor Bahru</option>
                    <option value="JHR03">Kluang, Pontian</option>
                    <option value="JHR04">Batu Pahat, Muar, Segamat, Tangkak</option>
                </optgroup>
            </select>
        </div>
    </div>

    <script>
        // Synchronize Dark Mode with Parent (index.html)
        function applyDarkMode() {
            if (localStorage.getItem('siswaklik_theme') === 'dark' || 
                (!localStorage.getItem('siswaklik_theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyDarkMode();
        // Listen for changes from parent
        window.addEventListener('storage', applyDarkMode);

        const prayerNames = [
            { id: 'fajr', label: 'Subuh', icon: 'fa-cloud-moon' },
            { id: 'syuruk', label: 'Syuruk', icon: 'fa-sun' },
            { id: 'dhuhr', label: 'Zohor', icon: 'fa-sun' },
            { id: 'asr', label: 'Asar', icon: 'fa-cloud-sun' },
            { id: 'maghrib', label: 'Maghrib', icon: 'fa-moon' },
            { id: 'isha', label: 'Isyak', icon: 'fa-star-and-crescent' }
        ];

        async function kemaskiniWaktu() {
            const zon = document.getElementById('zonSelect').value;
            const container = document.getElementById('prayerContainer');
            const statusZon = document.getElementById('statusZon');
            
            try {
                const response = await fetch(`https://api.waktusolat.app/solat/${zon}`);
                const data = await response.json();

                if (data.status === "OK!") {
                    const today = new Date().getDate() - 1;
                    const prayerData = data.prayerTime[today];

                    document.getElementById('tarikhMasihi').innerText = prayerData.date;
                    document.getElementById('tarikhHijri').innerText = prayerData.hijri;
                    statusZon.innerText = `Zon: ${data.zone}`;

                    container.innerHTML = prayerNames.map(s => {
                        let masa = prayerData[s.id];
                        let masaFormat = masa.substring(0, 5);

                        return `
                            <div class="prayer-card group bg-slate-50 dark:bg-slate-800/40 hover:bg-brandBlue dark:hover:bg-brandBlue p-5 rounded-[2rem] border border-slate-100 dark:border-slate-700 hover:border-brandBlue transition-all duration-300">
                                <i class="fas ${s.icon} text-brandBlue dark:text-brandYellow group-hover:text-brandYellow mb-3 text-lg transition-colors"></i>
                                <p class="text-[10px] font-black text-slate-400 dark:text-slate-500 group-hover:text-white/80 uppercase mb-1 tracking-widest">${s.label}</p>
                                <p class="text-xl font-black text-brandBlue dark:text-white group-hover:text-brandYellow transition-colors">${masaFormat}</p>
                            </div>
                        `;
                    }).join('');
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="col-span-full bg-red-50 dark:bg-red-900/10 p-8 rounded-3xl border border-red-100 dark:border-red-900/20 text-center">
                        <i class="fas fa-exclamation-triangle text-red-500 mb-3 text-2xl"></i>
                        <p class="text-red-600 dark:text-red-400 font-bold text-sm">Gagal memuatkan data solat.</p>
                        <button onclick="kemaskiniWaktu()" class="mt-4 text-xs bg-brandBlue text-brandYellow px-8 py-3 rounded-xl font-bold uppercase hover:scale-105 transition-all blue-pop-shadow">Cuba Lagi</button>
                    </div>`;
            }
        }

        kemaskiniWaktu();
    </script>
</body>
</html>
