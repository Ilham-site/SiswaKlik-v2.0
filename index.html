<!DOCTYPE html>
<html lang="ms" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaKlik | Hub Akademik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#0057FF',
                        brandYellow: '#FFD700',
                        darkBg: '#0F172A',
                        darkCard: '#1E293B'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .drawer-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .dark .glass-nav { background: rgba(15, 23, 42, 0.9); border-color: #334155; }
        .nav-active { background-color: #FFD700 !important; color: #0057FF !important; font-weight: 800; border-right: 4px solid #0057FF; }
        .dark .nav-active { border-right: 4px solid #FFD700; }
        .user-profile-glow { box-shadow: 0 0 20px rgba(0, 87, 255, 0.3); }
        .blue-pop-shadow { box-shadow: 0 10px 25px -5px rgba(0, 87, 255, 0.4); }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen">

    <nav class="glass-nav border-b sticky top-0 z-50 px-4 md:px-6 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <button id="menuBtn" class="p-2 hover:bg-brandBlue/10 rounded-xl text-brandBlue dark:text-brandYellow transition-colors">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="flex items-center gap-2">
                <div class="bg-brandBlue p-2 rounded-lg text-brandYellow shadow-lg">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1 class="text-lg md:text-xl font-bold tracking-tight dark:text-white">SiswaKlik <span class="text-brandBlue dark:text-brandYellow">v2.0</span></h1>
            </div>
        </div>
        
        <div class="flex items-center gap-2 md:gap-4">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-brandYellow hover:scale-110 transition-all">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>

            <div class="flex items-center gap-3 text-right">
                <div class="hidden sm:block">
                    <h1 class="text-sm font-black text-slate-800 dark:text-slate-100" id="welcomeText">Selamat Datang!</h1>
                    <p class="text-[10px] font-bold text-brandBlue dark:text-brandYellow uppercase tracking-widest" id="userSubtext">Memuatkan...</p>
                </div>
                <div id="userImageContainer" class="relative">
                    <div id="defaultIcon" class="bg-brandBlue p-2.5 rounded-2xl blue-pop-shadow">
                        <i class="fas fa-user text-brandYellow text-sm"></i>
                    </div>
                    <img id="userAvatar" src="" class="hidden w-10 h-10 rounded-xl object-cover border-2 border-brandYellow user-profile-glow" alt="Profile">
                </div>
            </div>
        </div>
    </nav>

    <div id="drawerOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-[60]"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white dark:bg-darkCard z-[70] transform -translate-x-full drawer-transition flex flex-col shadow-2xl">
        <div class="p-8 border-b dark:border-slate-700 flex justify-between items-center bg-brandBlue text-brandYellow">
            <div>
                <p class="text-xs opacity-90 font-bold uppercase tracking-widest mb-1 text-white">Menu Utama</p>
                <h2 class="font-bold text-xl">Navigasi Pintar</h2>
            </div>
            <button id="closeBtn" class="hover:rotate-90 transition-transform text-white"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <nav class="p-4 space-y-2 flex-1 mt-4">
            <button onclick="loadDashboard()" class="nav-item w-full flex items-center gap-4 p-4 hover:bg-brandBlue/5 dark:hover:bg-slate-800 rounded-2xl text-slate-600 dark:text-slate-300 transition-all nav-active" id="dashBtn">
                <i class="fas fa-th-large"></i> Dashboard
            </button>
            <button onclick="loadPage('kalendar.html', this)" class="nav-item w-full flex items-center gap-4 p-4 hover:bg-brandBlue/5 dark:hover:bg-slate-800 rounded-2xl text-slate-600 dark:text-slate-300 transition-all">
                <i class="fas fa-calendar-alt"></i> Kalendar Pintar
            </button>
            <button onclick="loadPage('fail.html', this)" class="nav-item w-full flex items-center gap-4 p-4 hover:bg-brandBlue/5 dark:hover:bg-slate-800 rounded-2xl text-slate-600 dark:text-slate-300 transition-all">
                <i class="fas fa-folder-open"></i> Fail Peribadi
            </button>
        </nav>

        <div class="p-6 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
            <button onclick="logout()" class="w-full flex items-center gap-4 p-4 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-2xl transition-all font-bold group">
                <i class="fas fa-sign-out-alt group-hover:-translate-x-1 transition-transform"></i> Log Keluar
            </button>
        </div>
    </aside>

    <main id="app-root" class="p-4 md:p-10 max-w-7xl mx-auto min-h-screen animate-fade mb-20 md:mb-0">
        <div id="dashboard-content" class="max-w-6xl mx-auto space-y-8">
            <header class="flex flex-col md:flex-row justify-between items-start gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 dark:text-white">Selamat Kembali, <span id="userNameDisplay" class="text-brandBlue dark:text-brandYellow">Pelajar</span>!</h1>
                    <p class="text-slate-500 dark:text-slate-400 font-medium mt-1">Sistem dihubungkan dengan Google Sheets.</p>
                </div>
                <div id="systemDate" class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest bg-slate-100 dark:bg-slate-800 px-4 py-2 rounded-full"></div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2">
                    <div class="bg-white dark:bg-darkCard p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-700 h-full">
                        <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-black text-slate-800 dark:text-white flex items-center gap-2">
                                <i class="fas fa-file-signature text-brandBlue dark:text-brandYellow"></i> Jadual Peperiksaan (Cloud)
                            </h2>
                            <button onclick="document.getElementById('kmjpInput').click()" class="text-xs font-bold bg-brandBlue text-brandYellow px-5 py-3 rounded-xl hover:scale-105 transition-all blue-pop-shadow">
                                <i class="fas fa-file-import mr-2"></i> KEMASKINI KMJP
                            </button>
                            <input type="file" id="kmjpInput" class="hidden" accept=".pdf" onchange="processKMJP(this)">
                        </div>
                        <div id="examContainer" class="space-y-4">
                            <div class="text-center py-10">
                                <div class="animate-spin inline-block w-8 h-8 border-4 border-brandBlue border-t-transparent rounded-full mb-4"></div>
                                <p class="text-slate-400 text-sm font-medium italic">Menghubungkan ke Google Sheets...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-8">
                    <div class="bg-gradient-to-br from-brandBlue to-indigo-800 p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden blue-pop-shadow">
                        <i class="fas fa-university absolute -right-4 -bottom-4 text-brandYellow/10 text-9xl"></i>
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                            <span class="w-2 h-2 bg-brandYellow rounded-full animate-pulse"></span> Status Akademik
                        </h3>
                        <div class="space-y-4 relative z-10">
                            <div>
                                <p class="text-[10px] text-brandYellow opacity-90 uppercase tracking-widest font-bold mb-1" id="weekStatus">Memproses...</p>
                                <h2 id="semesterStatus" class="text-2xl font-black leading-tight mb-1">Memuatkan...</h2>
                                <p id="dateRange" class="text-xs text-blue-100 font-medium">-</p>
                            </div>
                            <div class="pt-4 border-t border-white/10">
                                <div class="flex justify-between items-end mb-2">
                                    <span class="text-[10px] font-bold bg-white/20 px-3 py-1.5 rounded-full border border-white/10 uppercase" id="sessionTag">Sesi 2025/2026</span>
                                    <p class="text-lg font-black text-brandYellow" id="progressText">0%</p>
                                </div>
                                <div class="w-full h-3 bg-black/20 rounded-full overflow-hidden">
                                    <div id="progressBar" class="h-full bg-brandYellow rounded-full transition-all duration-1000 shadow-[0_0_10px_#FFD700]" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Configuration
        const CLIENT_ID = '755048052549-8tpra9hbicin61psv2pb0tvvjk9q2thr.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';
        let tokenClient;
        let gapiInited = false;
        let gisInited = false;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // --- Google API Initialization ---
        function gapiLoaded() { gapi.load('client', intializeGapiClient); }
        async function intializeGapiClient() {
            await gapi.client.init({
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4', 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
            });
            gapiInited = true;
            checkBeforeStart();
        }
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', // defined later
            });
            gisInited = true;
            checkBeforeStart();
        }
        function checkBeforeStart() { if (gapiInited && gisInited) initDashboard(); }

        // --- Core Functions ---
        async function getAccessToken() {
            return new Promise((resolve, reject) => {
                tokenClient.callback = (resp) => {
                    if (resp.error !== undefined) reject(resp);
                    resolve(resp.access_token);
                };
                if (gapi.client.getToken() === null) {
                    tokenClient.requestAccessToken({prompt: 'consent'});
                } else {
                    tokenClient.requestAccessToken({prompt: ''});
                }
            });
        }

        async function getOrCreateSpreadsheet() {
            const folderName = "SiswaKlik v2.0";
            const fileName = "KMJP v2.0";
            
            // 1. Cari Folder
            let res = await gapi.client.drive.files.list({ q: `name='${folderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false` });
            let folderId = res.result.files.length > 0 ? res.result.files[0].id : null;
            
            if (!folderId) {
                const folderMetadata = { name: folderName, mimeType: 'application/vnd.google-apps.folder' };
                const folder = await gapi.client.drive.files.create({ resource: folderMetadata, fields: 'id' });
                folderId = folder.result.id;
            }

            // 2. Cari Fail Spreadsheet
            res = await gapi.client.drive.files.list({ q: `name='${fileName}' and parents in '${folderId}' and trashed=false` });
            let fileId = res.result.files.length > 0 ? res.result.files[0].id : null;

            if (!fileId) {
                const ssMetadata = { properties: { title: fileName } };
                const spreadsheet = await gapi.client.sheets.spreadsheets.create({ resource: ssMetadata });
                fileId = spreadsheet.result.spreadsheetId;
                
                // Pindahkan ke folder
                await gapi.client.drive.files.update({ fileId: fileId, addParents: folderId, fields: 'id' });
                
                // Set Header
                const headers = [['KOD KURSUS', 'SET KURSUS', 'TAJUK KURSUS', 'TARIKH', 'MASA', 'TEMPOH', 'TEMPAT', 'MEJA']];
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: fileId,
                    range: 'Sheet1!A1',
                    valueInputOption: 'RAW',
                    resource: { values: headers }
                });
            }
            return fileId;
        }

        async function processKMJP(input) {
            const file = input.files[0];
            if (!file) return;
            
            try {
                Swal.fire({ title: 'Menyambung...', text: 'Sila sahkan akaun Google anda', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                await getAccessToken();
                
                Swal.update({ title: 'Mengekstrak PDF...', text: 'Menganalisa data jadual' });
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let text = '';
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(' ');
                    }
                    
                    const cleanText = text.replace(/\s+/g, ' ');
                    // Regex disesuaikan untuk format KMJP UKM
                    const pattern = /([A-Z]{4}\d{4})\s+(\d+)\s+(.*?)\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+(\d+\.\d+)\s+(.*?)\s+(\d+)/gi;
                    const rows = [];
                    let m;
                    while ((m = pattern.exec(cleanText)) !== null) {
                        rows.push([m[1], m[2], m[3].trim(), m[4], m[5], m[6], m[7].trim(), m[8]]);
                    }

                    if(rows.length === 0) {
                        Swal.fire('Ralat', 'Tiada data peperiksaan dikesan. Sila pastikan format PDF betul.', 'error');
                        return;
                    }

                    Swal.update({ title: 'Mengemaskini Cloud...', text: 'Menghantar data ke Spreadsheet' });
                    const spreadsheetId = await getOrCreateSpreadsheet();
                    
                    // Padam data lama (A2:H100)
                    await gapi.client.sheets.spreadsheets.values.clear({ spreadsheetId, range: 'Sheet1!A2:H100' });
                    
                    // Masukkan data baru
                    await gapi.client.sheets.spreadsheets.values.update({
                        spreadsheetId,
                        range: 'Sheet1!A2',
                        valueInputOption: 'RAW',
                        resource: { values: rows }
                    });

                    renderExamsFromCloud();
                    Swal.fire('Berjaya!', `${rows.length} subjek telah dikemaskini ke cloud.`, 'success');
                };
                reader.readAsArrayBuffer(file);
            } catch (err) {
                console.error(err);
                Swal.fire('Ralat', 'Gagal memproses fail ke Google Sheets.', 'error');
            }
        }

        async function renderExamsFromCloud() {
            const container = document.getElementById('examContainer');
            try {
                const spreadsheetId = await getOrCreateSpreadsheet();
                const response = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId, range: 'Sheet1!A2:H100' });
                const rows = response.result.values;

                if (!rows || rows.length === 0) {
                    container.innerHTML = `<div class="text-center py-10 opacity-30"><i class="fas fa-cloud-upload-alt text-4xl mb-2"></i><p>Tiada data peperiksaan di cloud.</p></div>`;
                    return;
                }

                container.innerHTML = rows.map(row => {
                    const dateParts = row[3].split('/');
                    const isoDate = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;
                    return `
                    <div class="flex items-center gap-4 p-5 rounded-[2rem] border border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-800/50 hover:border-brandBlue/30 transition group">
                        <div class="bg-brandBlue shadow-sm p-3 rounded-2xl text-center min-w-[70px]">
                            <p class="text-[10px] font-bold text-white/70 uppercase">${new Date(isoDate).toLocaleString('ms-MY', {month: 'short'})}</p>
                            <p class="text-xl font-black text-brandYellow">${new Date(isoDate).getDate()}</p>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-800 dark:text-slate-100 leading-tight text-sm md:text-base">${row[2]} (${row[0]})</h4>
                            <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-1 font-medium">
                                <i class="far fa-clock mr-1 text-brandBlue"></i> ${row[4]} (${row[5]} Jam) • 
                                <i class="fas fa-map-marker-alt mr-1 text-rose-500"></i> ${row[6]} (Meja: ${row[7]})
                            </p>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                container.innerHTML = `<button onclick="getAccessToken().then(renderExamsFromCloud)" class="w-full p-6 border-2 border-dashed rounded-3xl text-brandBlue font-bold">Tekan untuk Sambung ke Google Sheets</button>`;
            }
        }

        // --- Rest of Original UI Logic ---
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('siswaklik_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        function initDashboard() {
            const userData = JSON.parse(localStorage.getItem('siswaklik_user'));
            if(userData) {
                document.getElementById('welcomeText').innerText = `Hai, ${userData.given_name || userData.name.split(' ')[0]}!`;
                document.getElementById('userSubtext').innerText = userData.email;
                document.getElementById('userNameDisplay').innerText = userData.name.split(' ')[0];
                if (userData.picture) {
                    const avatar = document.getElementById('userAvatar');
                    avatar.src = userData.picture;
                    avatar.classList.remove('hidden');
                    document.getElementById('defaultIcon').classList.add('hidden');
                }
            }
            updateDate();
            renderExamsFromCloud();
        }

        function updateDate() {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const el = document.getElementById('systemDate');
            if(el) el.innerText = new Date().toLocaleDateString('ms-MY', options);
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        // Sidebar logic
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('drawerOverlay');
        function toggleSidebar(show) {
            sidebar.classList.toggle('-translate-x-full', !show);
            overlay.classList.toggle('hidden', !show);
        }
        document.getElementById('menuBtn').onclick = () => toggleSidebar(true);
        document.getElementById('closeBtn').onclick = () => toggleSidebar(false);

        window.onload = () => {
            if (!localStorage.getItem('siswaklik_user')) {
                window.location.href = 'login.html';
            } else {
                gapiLoaded();
                gisLoaded();
            }
        };
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
