<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalendar SiswaKlik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg-main: #ffffff;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #f1f5f9;
            --input-bg: #f8fafc;
        }

        /* Dark Mode Styles */
        body.dark-mode {
            --bg-main: transparent;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: transparent; 
            overflow: hidden; 
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .fc { 
            --fc-border-color: var(--border-color); 
            --fc-button-bg-color: var(--bg-card);
            --fc-button-border-color: var(--border-color);
            --fc-button-text-color: var(--text-muted);
            --fc-button-active-bg-color: #2563eb;
            --fc-button-active-border-color: #2563eb;
            --fc-today-bg-color: rgba(37, 99, 235, 0.1);
            color: var(--text-main);
        }

        .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 800; color: var(--text-main); }
        
        .fc .fc-button {
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 5px 12px;
            background-color: var(--bg-card);
            color: var(--text-muted);
        }

        .fc-event {
            cursor: pointer;
            border-radius: 6px;
            padding: 2px 5px;
            border: none !important;
            transition: transform 0.1s;
        }

        /* Card & Modal Adjustments */
        .main-card { background-color: var(--bg-card); border-color: var(--border-color); }
        .modal-content { background-color: var(--bg-card); color: var(--text-main); }
        .input-field { background-color: var(--input-bg); border-color: var(--border-color); color: var(--text-main); }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }

        .color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; border: 2px solid transparent; }
        .color-opt:hover { transform: scale(1.2); }
        .color-opt.active { border-color: #64748b; transform: scale(1.1); }
    </style>
</head>
<body class="p-2">

    <div class="main-card max-w-full rounded-[2rem] shadow-sm border">
        <div class="p-6 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4" style="border-color: var(--border-color)">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div>
                    <h2 class="text-xl font-extrabold" style="color: var(--text-main)">Perancang Akademik</h2>
                    <p id="syncStatus" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Menyemak Sambungan Cloud...</p>
                </div>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button onclick="syncWithCloud()" class="bg-emerald-50 text-emerald-600 px-4 py-2.5 rounded-xl font-bold text-xs hover:bg-emerald-100 transition-all flex items-center gap-2">
                    <i class="fas fa-cloud-download-alt"></i> Sync
                </button>
                <button onclick="openModal()" class="flex-1 md:flex-none bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-plus text-xs"></i> Tambah Aktiviti
                </button>
            </div>
        </div>

        <div class="p-4">
            <div id="calendar"></div>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-50 p-4">
        <div class="modal-content p-6 rounded-[2rem] w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl border" style="border-color: var(--border-color)">
            <div class="flex justify-between items-center mb-5">
                <h3 id="modalTitle" class="text-lg font-extrabold">Aktiviti Baru</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-4">
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tajuk</label>
                        <input type="text" id="title" class="input-field w-full p-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Warna</label>
                        <div class="flex gap-1 mt-2" id="colorPicker">
                            <div class="color-opt bg-red-500" onclick="selectColor('#ef4444', this)"></div>
                            <div class="color-opt bg-orange-500" onclick="selectColor('#f97316', this)"></div>
                            <div class="color-opt bg-yellow-400" onclick="selectColor('#facc15', this)"></div>
                            <div class="color-opt bg-green-500" onclick="selectColor('#22c55e', this)"></div>
                            <div class="color-opt bg-blue-500 active" onclick="selectColor('#3b82f6', this)"></div>
                            <div class="color-opt bg-indigo-500" onclick="selectColor('#6366f1', this)"></div>
                            <div class="color-opt bg-purple-500" onclick="selectColor('#a855f7', this)"></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tarikh Mula</label>
                        <input type="date" id="startDate" class="input-field w-full p-3 rounded-xl border outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Tarikh Tamat</label>
                        <input type="date" id="endDate" class="input-field w-full p-3 rounded-xl border outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Masa Mula</label>
                        <input type="time" id="startTime" class="input-field w-full p-3 rounded-xl border outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Masa Tamat</label>
                        <input type="time" id="endTime" class="input-field w-full p-3 rounded-xl border outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Ulang (Repeat)</label>
                    <select id="repeatType" class="input-field w-full p-3 rounded-xl border outline-none">
                        <option value="none">Tiada</option>
                        <option value="daily">Setiap Hari</option>
                        <option value="weekly">Setiap Minggu</option>
                        <option value="monthly">Setiap Bulan</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Lokasi</label>
                    <input type="text" id="location" placeholder="Lokasi/Link" class="input-field w-full p-3 rounded-xl border outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1 uppercase">Description</label>
                    <textarea id="description" rows="2" class="input-field w-full p-3 rounded-xl border outline-none" placeholder="Nota tambahan..."></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="closeModal()" class="flex-1 px-5 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-50 transition-all">Batal</button>
                    <button id="saveBtn" onclick="saveEvent()" class="flex-[2] bg-blue-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">Simpan ke Cloud</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let calendar;
        let selectedColor = '#3b82f6';
        let spreadsheetId = localStorage.getItem('siswaklik_spreadsheet_id');
        const accessToken = localStorage.getItem('siswaklik_access_token');

        // --- PENGURUSAN TEMA (AUTO SYNC) ---
        window.addEventListener('message', function(event) {
            if (event.data.type === 'THEME_CHANGE') {
                toggleDarkMode(event.data.isDark);
            }
        });

        function toggleDarkMode(isDark) {
            if (isDark) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            if(calendar) calendar.render(); // Refresh UI kalendar
        }

        document.addEventListener('DOMContentLoaded', async function() {
            // Semak tema asal semasa load
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            toggleDarkMode(isDark);

            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listMonth' },
                locale: 'ms',
                firstDay: 1,
                events: [],
                eventClick: function(info) {
                    const props = info.event.extendedProps;
                    
                    Swal.fire({
                        title: info.event.title,
                        html: `
                            <div class="text-left text-sm space-y-2 border-t pt-4">
                                <p><strong><i class="fas fa-clock mr-2 text-blue-500"></i>Mula:</strong> ${info.event.start.toLocaleString('ms-MY')}</p>
                                <p><strong><i class="fas fa-flag-checkered mr-2 text-emerald-500"></i>Tamat:</strong> ${info.event.end ? info.event.end.toLocaleString('ms-MY') : 'N/A'}</p>
                                <p><strong><i class="fas fa-map-marker-alt mr-2 text-rose-500"></i>Lokasi:</strong> ${props.location || 'N/A'}</p>
                                <p><strong><i class="fas fa-info-circle mr-2 text-amber-500"></i>Nota:</strong> ${props.description || 'Tiada nota tambahan.'}</p>
                                ${props.type ? `<p class='mt-2'><span class='px-2 py-1 bg-slate-100 rounded-md text-[10px] uppercase font-bold text-slate-500'>${props.type}</span></p>` : ''}
                            </div>
                        `,
                        showCancelButton: true,
                        confirmButtonText: 'Tutup',
                        cancelButtonText: 'Padam Aktiviti',
                        cancelButtonColor: '#ef4444',
                        confirmButtonColor: '#2563eb'
                    }).then((result) => {
                        if (result.dismiss === Swal.DismissReason.cancel) {
                            if(props.type === 'holiday' || props.type === 'school') {
                                Swal.fire('Info', 'Cuti rasmi tidak boleh dipadam.', 'info');
                            } else {
                                deleteEventFromCloud(props.rowId, info.event);
                            }
                        }
                    });
                }
            });
            calendar.render();
            await loadExternalData();
            if (accessToken) initCloudStorage();
        });

        // --- GOOGLE SHEETS & CLOUD SYNC ---
        async function initCloudStorage() {
            try {
                if (!spreadsheetId) {
                    let folderId = await getOrCreateFolder("SiswaKlik");
                    spreadsheetId = await getOrCreateSpreadsheet("SiswaKlik Time Management", folderId);
                    localStorage.setItem('siswaklik_spreadsheet_id', spreadsheetId);
                }
                syncWithCloud();
            } catch (err) { console.error(err); }
        }

        async function getOrCreateFolder(folderName) {
            const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${folderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            }).then(r => r.json());
            if (search.files && search.files.length > 0) return search.files[0].id;
            const create = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: folderName, mimeType: 'application/vnd.google-apps.folder' })
            }).then(r => r.json());
            return create.id;
        }

        async function getOrCreateSpreadsheet(name, folderId) {
            const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${name}' and trashed=false`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            }).then(r => r.json());
            if (search.files && search.files.length > 0) return search.files[0].id;
            const create = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, mimeType: 'application/vnd.google-apps.spreadsheet', parents: [folderId] })
            }).then(r => r.json());
            await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${create.id}/values/A1:I1?valueInputOption=USER_ENTERED`, {
                method: 'PUT',
                headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ values: [["Tajuk", "Warna", "T.Mula", "T.Tamat", "M.Mula", "M.Tamat", "Lokasi", "Ulang", "Deskripsi"]] })
            });
            return create.id;
        }

        async function syncWithCloud() {
            if (!spreadsheetId) return;
            document.getElementById('syncStatus').innerText = "Menyegerak...";
            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/A2:I500`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                }).then(r => r.json());
                
                if (response.values) {
                    calendar.getEvents().forEach(ev => { if (ev.extendedProps.type !== 'holiday') ev.remove(); });
                    response.values.forEach((row, index) => {
                        calendar.addEvent({
                            title: row[0],
                            backgroundColor: row[1],
                            start: row[4] ? `${row[2]}T${row[4]}` : row[2],
                            end: row[5] ? `${row[3]}T${row[5]}` : row[3],
                            extendedProps: { 
                                location: row[6], 
                                repeat: row[7], 
                                description: row[8],
                                rowId: index + 1
                            }
                        });
                    });
                }
                document.getElementById('syncStatus').innerText = "Cloud Terkini";
            } catch (e) { 
                document.getElementById('syncStatus').innerText = "Ralat Cloud";
            }
        }

        async function saveEvent() {
            const title = document.getElementById('title').value;
            const start = document.getElementById('startDate').value;
            if (!title || !start) return Swal.fire('Ralat', 'Tajuk & Tarikh wajib diisi', 'error');
            const eventData = [title, selectedColor, start, document.getElementById('endDate').value || start, document.getElementById('startTime').value, document.getElementById('endTime').value, document.getElementById('location').value, document.getElementById('repeatType').value, document.getElementById('description').value];
            
            Swal.fire({ title: 'Menyimpan...', didOpen: () => Swal.showLoading() });
            try {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/A2:append?valueInputOption=USER_ENTERED`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: [eventData] })
                });
                await syncWithCloud();
                closeModal();
                Swal.fire('Berjaya', 'Aktiviti disimpan!', 'success');
            } catch (err) { Swal.fire('Gagal', 'Sila log masuk semula', 'error'); }
        }

        async function deleteEventFromCloud(rowIdx, eventInstance) {
            if (!rowIdx) return Swal.fire('Ralat', 'ID Aktiviti tidak ditemui.', 'error');
            Swal.fire({ title: 'Memadam...', didOpen: () => Swal.showLoading() });
            const requestBody = {
                requests: [{
                    deleteDimension: {
                        range: { sheetId: 0, dimension: "ROWS", startIndex: rowIdx, endIndex: rowIdx + 1 }
                    }
                }]
            };
            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                if (response.ok) {
                    eventInstance.remove();
                    Swal.fire('Dipadam', 'Aktiviti telah dibuang secara kekal.', 'success');
                    setTimeout(syncWithCloud, 1000);
                } else { throw new Error("Gagal"); }
            } catch (err) { Swal.fire('Ralat', 'Gagal memadam data.', 'error'); }
        }

        async function loadExternalData() {
            try {
                const jsonResponse = await fetch('2026.json');
                const jsonData = await jsonResponse.json();
                if (jsonData.hari_kelepasan_am) {
                    jsonData.hari_kelepasan_am.forEach(item => {
                        const dateParts = item.tarikh.split(' ');
                        const months = {"Januari":"01","Februari":"02","Mac":"03","April":"04","Mei":"05","Jun":"06","Julai":"07","Ogos":"08","September":"09","Oktober":"10","November":"11","Disember":"12"};
                        const formattedDate = `2026-${months[dateParts[1]]}-${dateParts[0].padStart(2, '0')}`;
                        calendar.addEvent({
                            title: `[CUTI] ${item.peristiwa}`,
                            start: formattedDate,
                            backgroundColor: item.jenis === 'Persekutuan' ? '#ef4444' : '#f97316',
                            extendedProps: { type: 'holiday', location: 'Seluruh Malaysia' }
                        });
                    });
                }
            } catch (err) { console.warn("Fail 2026.json tidak dijumpai."); }
        }

        function openModal() { 
            document.getElementById('title').value = "";
            document.getElementById('startDate').value = "";
            document.getElementById('eventModal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('eventModal').classList.add('hidden'); }
        function selectColor(color, el) {
            selectedColor = color;
            document.querySelectorAll('.color-opt').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
